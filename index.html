<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇 · SNAKE</title>
<style>
  :root {
    --bg: #06060e;
    --surface: #0d0d1a;
    --border: #1a1a3e;
    --cyan: #00f0ff;
    --magenta: #ff00e5;
    --gold: #ffd700;
    --green: #39ff14;
    --text: #c8c8e0;
    --text-dim: #5c5c8a;
    --glow-cyan: 0 0 20px rgba(0, 240, 255, 0.5), 0 0 60px rgba(0, 240, 255, 0.15);
    --glow-magenta: 0 0 20px rgba(255, 0, 229, 0.5), 0 0 60px rgba(255, 0, 229, 0.15);
    --glow-gold: 0 0 20px rgba(255, 215, 0, 0.4), 0 0 60px rgba(255, 215, 0, 0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  @font-face {
    font-family: 'GameDisplay';
    src: local('Orbitron'), local('Courier New');
  }

  body {
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Orbitron', 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }

  /* Ambient background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridDrift 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridDrift {
    0% { background-position: 0 0, 0 0; }
    100% { background-position: 60px 60px, 60px 60px; }
  }

  /* Vignette overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(6, 6, 14, 0.8) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 480px;
    padding: 0 4px;
  }

  .title-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .title {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    text-transform: uppercase;
    line-height: 1;
  }

  .subtitle {
    font-size: 10px;
    letter-spacing: 8px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .score-display {
    text-align: right;
  }

  .score-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .score-value {
    font-size: 36px;
    font-weight: 900;
    color: var(--gold);
    text-shadow: var(--glow-gold);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: color 0.2s;
  }

  .score-value.pulse {
    animation: scorePop 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
  }

  @keyframes scorePop {
    0%, 100% { transform: scale(1); }
    40% { transform: scale(1.3); color: var(--magenta); text-shadow: var(--glow-magenta); }
  }

  .best-display {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .best-display span {
    color: var(--cyan);
  }

  /* ── Game Area ── */
  .game-wrapper {
    position: relative;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 6px;
    background: var(--surface);
    box-shadow:
      0 0 40px rgba(0, 240, 255, 0.08),
      inset 0 0 40px rgba(0, 0, 0, 0.4);
  }

  .game-wrapper::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 8px;
    padding: 2px;
    background: linear-gradient(135deg, var(--cyan), transparent 40%, transparent 60%, var(--magenta));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.6;
  }

  canvas {
    display: block;
    border-radius: 4px;
    background: #08081a;
  }

  /* ── Overlay Screens ── */
  .overlay {
    position: absolute;
    inset: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: rgba(6, 6, 20, 0.85);
    backdrop-filter: blur(8px);
    border-radius: 4px;
    transition: opacity 0.4s, visibility 0.4s;
    z-index: 10;
  }

  .overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .overlay-title {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    animation: titlePulse 2s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 20px rgba(0, 240, 255, 0.4), 0 0 60px rgba(0, 240, 255, 0.1); }
    50% { text-shadow: 0 0 35px rgba(0, 240, 255, 0.7), 0 0 100px rgba(0, 240, 255, 0.25); }
  }

  .overlay-sub {
    font-size: 12px;
    letter-spacing: 5px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.8;
  }

  .overlay-sub kbd {
    display: inline-block;
    background: var(--border);
    color: var(--cyan);
    padding: 2px 8px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    border: 1px solid rgba(0, 240, 255, 0.2);
  }

  .btn {
    position: relative;
    background: transparent;
    border: 1.5px solid var(--cyan);
    color: var(--cyan);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    padding: 12px 36px;
    cursor: pointer;
    transition: all 0.3s ease;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: -1;
  }

  .btn:hover {
    color: var(--bg);
    box-shadow: var(--glow-cyan);
  }

  .btn:hover::before {
    opacity: 1;
  }

  .btn.secondary {
    border-color: var(--magenta);
    color: var(--magenta);
  }

  .btn.secondary::before {
    background: var(--magenta);
  }

  .btn.secondary:hover {
    color: var(--bg);
    box-shadow: var(--glow-magenta);
  }

  .gameover-score {
    font-size: 64px;
    font-weight: 900;
    color: var(--magenta);
    text-shadow: var(--glow-magenta);
    line-height: 1;
  }

  .gameover-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-dim);
  }

  .gameover-best {
    font-size: 13px;
    color: var(--text);
    letter-spacing: 2px;
  }

  .gameover-best span {
    color: var(--gold);
    text-shadow: var(--glow-gold);
  }

  /* ── Controls hint ── */
  .controls-hint {
    display: flex;
    gap: 20px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
  }

  .controls-hint span {
    color: var(--cyan);
  }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    .title { font-size: 20px; letter-spacing: 3px; }
    .score-value { font-size: 28px; }
    .overlay-title { font-size: 28px; letter-spacing: 5px; }
    .gameover-score { font-size: 48px; }
    canvas { width: 340px !important; height: 340px !important; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="title-block">
      <div class="title">贪吃蛇</div>
      <div class="subtitle">Retro Arcade</div>
    </div>
    <div class="score-display">
      <div class="score-label">Score</div>
      <div class="score-value" id="score">0</div>
      <div class="best-display">BEST <span id="best">0</span></div>
    </div>
  </div>

  <!-- Game -->
  <div class="game-wrapper" id="gameWrapper">
    <canvas id="gameCanvas"></canvas>

    <!-- Start Overlay -->
    <div class="overlay" id="startOverlay">
      <div class="overlay-title">SNAKE</div>
      <div class="overlay-sub">
        使用 <kbd>↑↓←→</kbd> 或 <kbd>W A S D</kbd> 控制方向<br>
        按 <kbd>空格</kbd> 暂停
      </div>
      <button class="btn" id="startBtn">开始游戏</button>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay hidden" id="gameoverOverlay">
      <div class="gameover-label">GAME OVER</div>
      <div class="gameover-score" id="finalScore">0</div>
      <div class="gameover-best">最高分 <span id="finalBest">0</span></div>
      <button class="btn" id="restartBtn">再来一局</button>
    </div>

    <!-- Pause Overlay -->
    <div class="overlay hidden" id="pauseOverlay">
      <div class="overlay-title">暂停</div>
      <div class="overlay-sub">按 <kbd>空格</kbd> 继续</div>
    </div>
  </div>

  <!-- Controls hint -->
  <div class="controls-hint">
    <div><span>↑↓←→</span> 移动</div>
    <div><span>空格</span> 暂停</div>
  </div>
</div>

<script>
  (function() {
    // ─── DOM Elements ────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const startOverlay = document.getElementById('startOverlay');
    const gameoverOverlay = document.getElementById('gameoverOverlay');
    const pauseOverlay = document.getElementById('pauseOverlay');
    const finalScoreEl = document.getElementById('finalScore');
    const finalBestEl = document.getElementById('finalBest');
    const gameWrapper = document.getElementById('gameWrapper');

    // ─── Constants ───────────────────────────
    const GRID = 20;           // cells
    const CELL = 24;           // px per cell
    const GAP = 2;             // gap between cells
    const TOTAL = GRID * CELL;
    const BASE_SPEED = 110;    // ms per tick (lower = faster)

    // ─── State ──────────────────────────────
    let snake, food, direction, nextDirection;
    let score, best, speed;
    let gameLoop, particles;
    let running, paused, gameStarted;
    let trailPositions;       // for trail effect

    // ─── Initialize ─────────────────────────
    canvas.width = TOTAL;
    canvas.height = TOTAL;

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    bestEl.textContent = best;

    function resetState() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 },
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      speed = BASE_SPEED;
      particles = [];
      trailPositions = [];
      scoreEl.textContent = '0';
      scoreEl.classList.remove('pulse');
      spawnFood();
    }

    function spawnFood() {
      const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
      const candidates = [];
      for (let x = 0; x < GRID; x++) {
        for (let y = 0; y < GRID; y++) {
          if (!occupied.has(`${x},${y}`)) candidates.push({ x, y });
        }
      }
      food = candidates[Math.floor(Math.random() * candidates.length)];
    }

    // ─── Particles ──────────────────────────
    function spawnParticles(x, y, color) {
      const cx = x * CELL + CELL / 2;
      const cy = y * CELL + CELL / 2;
      for (let i = 0; i < 12; i++) {
        const angle = (Math.PI * 2 * i) / 12 + (Math.random() - 0.5) * 0.6;
        const vel = 2 + Math.random() * 4;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * vel,
          vy: Math.sin(angle) * vel,
          life: 1,
          decay: 0.02 + Math.random() * 0.04,
          size: 1.5 + Math.random() * 2.5,
          color,
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ─── Game Logic ─────────────────────────
    function update() {
      direction = { ...nextDirection };

      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

      // Wall collision → die
      if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
        return gameOver();
      }

      // Self collision → die
      for (const seg of snake) {
        if (seg.x === head.x && seg.y === head.y) return gameOver();
      }

      // Trail tracking for visual effect
      trailPositions.unshift({ ...snake[0] });
      if (trailPositions.length > 4) trailPositions.pop();

      snake.unshift(head);

      // Eat food
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        scoreEl.classList.remove('pulse');
        void scoreEl.offsetWidth;
        scoreEl.classList.add('pulse');

        spawnParticles(food.x, food.y, '#ffd700');
        spawnFood();

        // Speed up
        speed = Math.max(50, BASE_SPEED - Math.floor(score / 50) * 5);

        // Update best
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snakeBest', best);
        }
      } else {
        snake.pop();
      }
    }

    function gameOver() {
      running = false;
      clearInterval(gameLoop);
      gameStarted = false;

      finalScoreEl.textContent = score;
      finalBestEl.textContent = best;

      // Death particles
      for (const seg of snake) {
        spawnParticles(seg.x, seg.y, '#ff00e5');
      }

      gameoverOverlay.classList.remove('hidden');
    }

    // ─── Rendering ──────────────────────────
    function drawGrid() {
      ctx.strokeStyle = 'rgba(0, 240, 255, 0.04)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= GRID; i++) {
        const pos = i * CELL;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, TOTAL);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(TOTAL, pos);
        ctx.stroke();
      }
    }

    function drawCell(x, y, color, glowColor, radius = 4) {
      const px = x * CELL + GAP;
      const py = y * CELL + GAP;
      const size = CELL - GAP * 2;

      ctx.save();
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 10;

      // Rounded rect
      const r = radius;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(px + r, py);
      ctx.lineTo(px + size - r, py);
      ctx.quadraticCurveTo(px + size, py, px + size, py + r);
      ctx.lineTo(px + size, py + size - r);
      ctx.quadraticCurveTo(px + size, py + size, px + size - r, py + size);
      ctx.lineTo(px + r, py + size);
      ctx.quadraticCurveTo(px, py + size, px, py + size - r);
      ctx.lineTo(px, py + r);
      ctx.quadraticCurveTo(px, py, px + r, py);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function render() {
      ctx.clearRect(0, 0, TOTAL, TOTAL);

      // Background
      ctx.fillStyle = '#08081a';
      ctx.fillRect(0, 0, TOTAL, TOTAL);

      drawGrid();

      // Trail
      for (let i = 0; i < trailPositions.length; i++) {
        const t = trailPositions[i];
        const alpha = 0.15 - i * 0.03;
        if (alpha > 0) {
          drawCell(t.x, t.y, `rgba(0, 240, 255, ${alpha})`, 'transparent', 6);
        }
      }

      // Snake body (gradient from tail to head)
      for (let i = snake.length - 1; i >= 0; i--) {
        const seg = snake[i];
        const t = i / Math.max(snake.length - 1, 1);
        // Gradient: tail=deep blue, head=bright cyan
        const r = Math.floor(0 + t * 0);
        const g = Math.floor(80 + t * 175);
        const b = Math.floor(200 + t * 55);
        const alpha = 0.75 + t * 0.25;
        const color = `rgba(${r}, ${g}, ${b}, ${alpha})`;
        const glow = i === 0 ? 'rgba(0, 240, 255, 0.8)' : 'transparent';
        drawCell(seg.x, seg.y, color, glow, i === 0 ? 6 : 5);
      }

      // Snake head highlight
      if (snake.length > 0) {
        const head = snake[0];
        const hx = head.x * CELL + CELL / 2;
        const hy = head.y * CELL + CELL / 2;
        ctx.save();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.beginPath();
        ctx.arc(hx - 3, hy - 3, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // Food (pulsing)
      const pulse = 1 + Math.sin(Date.now() / 200) * 0.15;
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;

      // Outer glow
      ctx.save();
      ctx.shadowColor = 'rgba(255, 215, 0, 0.8)';
      ctx.shadowBlur = 15 * pulse;
      const gradient = ctx.createRadialGradient(fx, fy, 0, fx, fy, (CELL / 2 - 2) * pulse);
      gradient.addColorStop(0, '#fff8c0');
      gradient.addColorStop(0.5, '#ffd700');
      gradient.addColorStop(1, '#ff8c00');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(fx, fy, (CELL / 2 - 3) * pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Particles
      drawParticles();
    }

    function tick() {
      if (!running) return;
      update();
      updateParticles();
      render();

      // If game ended during update, render once more for death particles
      if (!running) {
        let deathFrames = 0;
        const deathAnim = setInterval(() => {
          updateParticles();
          render();
          deathFrames++;
          if (deathFrames > 30 || particles.length === 0) {
            clearInterval(deathAnim);
          }
        }, 30);
      }
    }

    // ─── Core Loop ──────────────────────────
    function startGameLoop() {
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, speed);
    }

    function startGame() {
      resetState();
      running = true;
      paused = false;
      gameStarted = true;
      startOverlay.classList.add('hidden');
      gameoverOverlay.classList.add('hidden');
      pauseOverlay.classList.add('hidden');
      startGameLoop();
      render();
    }

    function togglePause() {
      if (!gameStarted) return;
      if (!running && !paused) return; // game over
      paused = !paused;
      if (paused) {
        running = false;
        clearInterval(gameLoop);
        pauseOverlay.classList.remove('hidden');
      } else {
        running = true;
        pauseOverlay.classList.add('hidden');
        startGameLoop();
      }
    }

    // ─── Input ──────────────────────────────
    const OPPOSITES = {
      'ArrowUp': 'ArrowDown', 'ArrowDown': 'ArrowUp',
      'ArrowLeft': 'ArrowRight', 'ArrowRight': 'ArrowLeft',
      'w': 's', 's': 'w', 'a': 'd', 'd': 'a',
      'W': 'S', 'S': 'W', 'A': 'D', 'D': 'A',
    };

    const DIR_MAP = {
      'ArrowUp':    { x: 0, y: -1, key: 'ArrowUp' },
      'ArrowDown':  { x: 0, y: 1,  key: 'ArrowDown' },
      'ArrowLeft':  { x: -1, y: 0, key: 'ArrowLeft' },
      'ArrowRight': { x: 1, y: 0,  key: 'ArrowRight' },
      'w': { x: 0, y: -1, key: 'w' },
      'W': { x: 0, y: -1, key: 'W' },
      's': { x: 0, y: 1,  key: 's' },
      'S': { x: 0, y: 1,  key: 'S' },
      'a': { x: -1, y: 0, key: 'a' },
      'A': { x: -1, y: 0, key: 'A' },
      'd': { x: 1, y: 0,  key: 'd' },
      'D': { x: 1, y: 0,  key: 'D' },
    };

    document.addEventListener('keydown', (e) => {
      // Start on Enter or Space when on start screen
      if (!gameStarted && e.key === 'Enter') {
        e.preventDefault();
        startGame();
        return;
      }

      // Pause toggle
      if (e.key === ' ' || e.code === 'Space') {
        e.preventDefault();
        if (!gameStarted && running === false && paused === false) {
          // If game over, restart
          if (!gameoverOverlay.classList.contains('hidden')) {
            startGame();
          }
          return;
        }
        togglePause();
        return;
      }

      // Direction
      const dir = DIR_MAP[e.key];
      if (!dir || !running) return;

      e.preventDefault();

      const currentKey = Object.entries(DIR_MAP).find(
        ([, v]) => v.x === direction.x && v.y === direction.y
      )?.[0];

      // Prevent 180° turn
      if (OPPOSITES[e.key] && OPPOSITES[e.key] === currentKey) return;
      // Prevent same direction
      if (dir.x === direction.x && dir.y === direction.y) return;

      nextDirection = { x: dir.x, y: dir.y };
    });

    // ─── Button Events ──────────────────────
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);

    // ─── Initial Render ─────────────────────
    resetState();
    render();
  })();
</script>
</body>
</html>
